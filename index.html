<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTUC Delivery Order Converter | FLOW SERVICES</title>
    
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    
    <!-- XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <img src="logo.png" alt="FLOW SERVICES" class="logo">
            <h1>FLOW SERVICES PTE LTD</h1>
            <p>NTUC Foodfare Delivery Order Converter</p>
        </div>

        <!-- File Upload Section -->
        <div class="form-section">
            <label><b>📄 NTUC PDF</b></label>
            <input type="file" id="pdfFile" accept=".pdf">
        </div>

        <div class="form-section">
            <label><b>📊 Address Master</b></label>
            <input type="file" id="masterFile" accept=".xlsx,.xls">
        </div>

        <!-- Action Buttons -->
        <div class="form-section" style="border-bottom: none;">
            <div class="button-group">
                <button id="processBtn">Convert PDF</button>
                <button id="exportBtn">Export Excel</button>
            </div>

            <!-- Status Display -->
            <div id="status"></div>

            <!-- Results Table -->
            <div id="results"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
